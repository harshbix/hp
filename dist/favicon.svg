<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Elite Dark Background -->
  <rect width="100" height="100" fill="#0A0A0A" rx="20"/>
  
  <defs>
    <!-- Cinematic silver/white gradient -->
    <linearGradient id="silver-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3" />
    </linearGradient>
  </defs>

  <!-- High-end structural grid lines (subtle) -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="50" y1="10" x2="50" y2="90" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Stylized H -->
  <!-- Left leg, right leg, crossbar -->
  <path d="M 26 32 L 26 68 M 46 32 L 46 68 M 26 50 L 46 50" 
        stroke="url(#silver-glow)" 
        stroke-width="8" 
        stroke-linecap="square" 
        fill="none"/>
  
  <!-- Stylized P -->
  <!-- Stem and bowl -->
  <path d="M 58 68 L 58 32 L 68 32 C 82 32 82 50 68 50 L 58 50" 
        stroke="url(#silver-glow)" 
        stroke-width="8" 
        stroke-linecap="square" 
        fill="none"/>
</svg>
